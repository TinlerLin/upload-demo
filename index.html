<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AntD Upload 文件信息获取</title>
  <!-- 1. AntD 4.x 样式（使用官方 cdnjs 稳定源） -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.15/antd.min.css" />
  <!-- 2. React 核心（官方稳定源） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
  <!-- 3. Babel 转译器（修复 404 关键，官方稳定源） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <!-- 4. AntD 4.x 组件库（官方稳定源） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.15/antd.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 标记为 Babel 转译代码 -->
  <script type="text/babel">
    const { Upload, Button, message } = antd;

    const uploadProps = {
      beforeUpload(file) {
        console.log("===== 上传文件信息 =====");
        console.log("文件名：", file.name);
        console.log("文件大小：", (file.size / 1024).toFixed(2) + " KB");
        console.log("文件类型：", file.type || "未知类型");
        console.log("最后修改时间：", new Date(file.lastModified).toLocaleString());
        console.log("完整文件对象：", file);

        message.success(`文件「${file.name}」信息已获取`);
        // 阻止自动上传，仅打印信息
        return false;
      },
    };

    const App = () => (
      <div style={{ padding: '50px', maxWidth: '400px', margin: '0 auto' }}>
        <h2 style={{ marginBottom: '20px' }}>AntD Upload 文件信息演示</h2>
        <Upload {...uploadProps}>
          <Button type="primary" size="large">点击上传文件</Button>
        </Upload>
      </div>
    );

    // React 17 挂载方式
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
