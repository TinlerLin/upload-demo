<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AntD Upload 文件信息获取</title>
  <!-- 1. AntD 4.x 样式（UMD 格式，原生支持） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@4.24.15/dist/antd.min.css" />
  <!-- 2. React 核心（AntD 4.x 最佳兼容版本） -->
  <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <!-- 3. Babel 转译器（核心！解决 JSX 语法报错） -->
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@7.23.9/babel.min.js"></script>
  <!-- 4. AntD 4.x 组件库（UMD 格式，挂载到 window.antd） -->
  <script src="https://cdn.jsdelivr.net/npm/antd@4.24.15/dist/antd.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 用 type="text/babel" 标记，让 Babel 转译 JSX -->
  <script type="text/babel">
    const { Upload, Button, message } = antd;

    const uploadProps = {
      beforeUpload(file) {
        console.log("===== 上传文件信息 =====");
        console.log("文件名：", file.name);
        console.log("文件大小：", (file.size / 1024).toFixed(2) + " KB");
        console.log("文件类型：", file.type || "未知类型");
        console.log("最后修改时间：", new Date(file.lastModified).toLocaleString());
        console.log("完整文件对象：", file);

        message.success(`文件「${file.name}」信息已获取`);
        // 阻止自动上传，仅打印信息
        return false;
      },
    };

    const App = () => (
      <div style={{ padding: '50px', maxWidth: '400px', margin: '0 auto' }}>
        <h2 style={{ marginBottom: '20px' }}>AntD Upload 文件信息演示</h2>
        <Upload {...uploadProps}>
          <Button type="primary" size="large">点击上传文件</Button>
        </Upload>
      </div>
    );

    // React 17 直接挂载（兼容所有环境）
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
