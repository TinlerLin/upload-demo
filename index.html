<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>文件上传信息获取</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5/dist/reset.css" />
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/antd@5/dist/antd.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    const { Upload, Button, message } = antd;
    const uploadProps = {
      beforeUpload(file) {
        console.log("===== 文件信息 =====");
        console.log("文件名：", file.name);
        console.log("文件大小：", (file.size / 1024).toFixed(2) + " KB");
        console.log("文件类型：", file.type);
        console.log("最后修改：", new Date(file.lastModified).toLocaleString());
        message.success("已获取文件信息");
        return false;
      }
    };
    const App = () => (
      <div style={{ padding: '50px' }}>
        <h2>AntD Upload 文件信息</h2>
        <Upload {...uploadProps}>
          <Button type="primary">选择文件</Button>
        </Upload>
      </div>
    );
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
